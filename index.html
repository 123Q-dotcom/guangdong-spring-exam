<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>广东省春季高考 · 依学考</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <main>
    <section class="hero">
      <h1 class="float-anim">广东省春季高考</h1>
      <span class="float-anim" style="display:block;font-size:var(--font-size-4xl);font-weight:700;color:var(--color-primary);margin-bottom:var(--spacing-sm);animation-delay:0.3s;">依学考</span>
      <p style="animation: fadeInUp 0.6s 0.5s ease both;">一站式了解政策、分数线、院校招生、备考资料</p>
      <div class="search-box-inline pulse-glow" style="max-width:560px;margin:0 auto;position:relative;animation: fadeInUp 0.6s 0.7s ease both;">
        <input type="text" id="homeSearch" placeholder="搜索政策、院校、科目..." style="width:100%;padding:16px 52px 16px 24px;border:2px solid var(--color-border-light);border-radius:var(--radius-full);font-size:var(--font-size-lg);font-family:var(--font-system);outline:none;transition:all 0.3s ease;background:var(--color-bg);">
        <svg id="homeSearchIcon" style="position:absolute;right:18px;top:50%;transform:translateY(-50%);width:22px;height:22px;color:var(--color-text-secondary);cursor:pointer;transition:color 0.2s ease;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
    </section>

    <section class="section bg-alt">
      <div class="container">
        <div class="card-grid grid-3" style="grid-template-columns:repeat(3,1fr);">
          <div class="card stat-card card-accent">
            <div class="stat-number"><span class="counter" data-target="105">0</span>+</div>
            <div class="stat-label">参与院校</div>
          </div>
          <div class="card stat-card card-accent">
            <div class="stat-number"><span class="counter" data-target="300000">0</span>+</div>
            <div class="stat-label">年均考生</div>
          </div>
          <div class="card stat-card card-accent">
            <div class="stat-number"><span class="counter" data-target="3">0</span>年</div>
            <div class="stat-label">成绩有效期</div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-header animate-on-scroll">
          <h2>快速了解</h2>
          <p>六大板块，全面掌握春季高考信息</p>
        </div>
        <div class="card-grid grid-3 animate-on-scroll" style="grid-template-columns:repeat(3,1fr);">
          <a href="policy.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">📋</div>
            <h3 class="card-title">政策解读</h3>
            <p class="card-text">了解依学考招生政策、报考条件和录取规则</p>
          </a>
          <a href="registration.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">📅</div>
            <h3 class="card-title">报名流程</h3>
            <p class="card-text">从报名到录取，一站式了解全流程时间节点</p>
          </a>
          <a href="subjects.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">📝</div>
            <h3 class="card-title">考试科目</h3>
            <p class="card-text">各科目考试大纲、分值与备考建议</p>
          </a>
          <a href="scores.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">📊</div>
            <h3 class="card-title">分数线</h3>
            <p class="card-text">历年各院校依学考录取分数线汇总</p>
          </a>
          <a href="schools.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">🏫</div>
            <h3 class="card-title">院校招生</h3>
            <p class="card-text">参与依学考招生的院校信息与专业介绍</p>
          </a>
          <a href="resources.html" class="card card-accent ripple" style="cursor:pointer;text-decoration:none;color:inherit;">
            <div style="font-size:2.2rem;margin-bottom:var(--spacing-sm);">📚</div>
            <h3 class="card-title">备考资料</h3>
            <p class="card-text">精选学考备考资源，助你高效复习</p>
          </a>
        </div>
      </div>
    </section>

    <section class="section bg-alt">
      <div class="container">
        <div class="section-header animate-on-scroll">
          <h2>最新政策</h2>
          <p>及时了解依学考最新政策动态</p>
        </div>
        <div class="card-grid animate-on-scroll" id="latestPolicies" style="grid-template-columns:repeat(3,1fr);">
          <div class="spinner"></div>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer" id="footer"></footer>
  <script src="js/search.js"></script>
  <script src="js/main.js"></script>
  <script>
    (async function() {
      try {
        var res = await fetch("data/policies.json");
        var data = await res.json();
        var latest = data.slice(0, 3);
        var container = document.getElementById("latestPolicies");
        container.innerHTML = latest.map(function(p) {
          return '<a href="policy.html?id=' + p.id + '" class="card card-accent" style="text-decoration:none;color:inherit;"><span class="tag tag-primary">' + p.category + '</span><h3 class="card-title" style="margin-top:var(--spacing-sm);">' + p.title + '</h3><p class="card-text" style="font-size:var(--font-size-xs);color:var(--color-text-secondary);">' + p.date + '</p><p class="card-text">' + p.summary + '</p></a>';
        }).join("");
      } catch(e) {
        document.getElementById("latestPolicies").innerHTML = '<p class="text-center text-secondary">加载失败，请刷新重试</p>';
      }
    })();
    document.getElementById("homeSearch").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        var btn = document.getElementById("navSearchBtn");
        if (btn) btn.click();
        setTimeout(function() {
          var si = document.getElementById("searchInput");
          if (si) { si.value = document.getElementById("homeSearch").value; si.dispatchEvent(new Event("input")); }
        }, 350);
      }
    });
    document.getElementById("homeSearchIcon").addEventListener("click", function() {
      var btn = document.getElementById("navSearchBtn");
      if (btn) btn.click();
      setTimeout(function() {
        var si = document.getElementById("searchInput");
        if (si) { si.value = document.getElementById("homeSearch").value; si.dispatchEvent(new Event("input")); }
      }, 350);
    });
  </script>
</body>
</html>
